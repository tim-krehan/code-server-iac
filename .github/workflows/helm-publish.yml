name: Publish Helm Chart

on:
  workflow_run:
    workflows:
      - "Build and Push Docker Image"
    types:
      - completed

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get code-server helm chart
        run: |
          set -ex;
          DOCKER_TAG=$(git describe --tags `git rev-list --tags --max-count=1`)
          rm -fr code-server charts
          git clone https://github.com/coder/code-server.git
          sed -i "/^image:/,/^  tag:/c\image:\n  repository: ghcr.io/tim-krehan/code-server-iac\n  tag: '$DOCKER_TAG'" code-server/ci/helm-chart/values.yaml
          mkdir ./charts
          cp -r code-server/ci/helm-chart ./charts/code-server
          rm -fr code-server

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          skip_existing: true
          packages_with_index: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
