name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # Required for GitHub Container Registry authentication

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Get the current date for date-based versioning
        id: date_version
        run: |
          DATE_VERSION=$(date +'%Y.%m')
          echo "DATE_VERSION=${DATE_VERSION}" >> $GITHUB_ENV

      - name: Check the count of released tags in the current month
        id: tag_count
        run: |
          TAG_COUNT=$(git tag --list "v${{ env.DATE_VERSION }}.*" | wc -l)
          echo "TAG_COUNT=${TAG_COUNT}" >> $GITHUB_ENV

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: tim-krehan
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build . \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DATE_VERSION }}.${{ env.TAG_COUNT }}

      - name: Push Docker image
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DATE_VERSION }}.${{ env.TAG_COUNT }}
