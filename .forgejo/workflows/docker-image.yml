name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: git.kr-t.de
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ forgejo.repository }}

jobs:
  build_and_publish:
    runs-on: self-hosted
    permissions:
      contents: write # Required for tagging commits
      packages: write
      id-token: write # Required for Forgjo Container Registry authentication

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Get the current date for date-based versioning
        run: |
          DATE_VERSION=$(date +'%Y.%m')
          echo "DATE_VERSION=${DATE_VERSION}" >> $FORGEJO_ENV

      - name: Check the count of released tags in the current month
        run: |
          git fetch --tags
          TAG_COUNT=$(git tag --list "${{ env.DATE_VERSION }}.*" | wc -l)
          TAG_COUNT=$((TAG_COUNT + 1))
          NEW_VERSION=${DATE_VERSION}.${TAG_COUNT}
          echo "NEW_VERSION=${NEW_VERSION}"
          echo "NEW_VERSION=${NEW_VERSION}" >> $FORGEJO_ENV

      - name: Tag the current commit
        if: ${{ forgejo.event_name != 'pull_request' }}
        run: |
          git config --global user.name "${{ forgejo.actor }}"
          git config --global user.email "${{ forgejo.actor }}@git.kr-t.de"
          git tag -a "${{ env.NEW_VERSION }}" -m "Release ${{ env.NEW_VERSION }}"
          git push origin "${{ env.NEW_VERSION }}"

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: actions
          password: ${{ secrets.FORGEJO_TOKEN }}

      - name: Build Docker image
        run: |
          docker build . \
            --build-arg CODE_SERVER_IAC_VERSION=${{ env.NEW_VERSION }} \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.NEW_VERSION }}

      - name: Push Docker image
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.NEW_VERSION }}
